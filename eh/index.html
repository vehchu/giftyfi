<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftyfi - Share Songs as Gifts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin: 20px 0;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
        }
        
        .song-result {
            background: #f9f9f9;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .song-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .song-info {
            padding: 20px;
        }
        
        .song-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .song-artist {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .song-album {
            font-size: 12px;
            color: #bbb;
            margin-bottom: 15px;
        }
        
        .gift-link-section {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .gift-link-label {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .gift-link {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .gift-link-input {
            flex: 1;
            padding: 10px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            font-family: monospace;
            word-break: break-all;
        }
        
        .copy-btn {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .copy-btn:hover {
            background: #5568d3;
        }
        
        .copy-btn.copied {
            background: #22c55e;
        }
        
        .spotify-button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #1db954;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .spotify-button:hover {
            background: #1ed760;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Giftyfi</h1>
        <p class="subtitle">Share your favorite songs as unique gifts</p>
        
        <div class="search-form">
            <input 
                type="text" 
                id="songQuery" 
                placeholder="Search for a song..." 
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="searchSong()">Search</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div> Searching Spotify...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="result"></div>
    </div>
    
    <script>
        async function searchSong() {
            const query = document.getElementById('songQuery').value.trim();
            
            if (!query) {
                showError('Please enter a song name');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').innerHTML = '';
            
            try {
                const response = await fetch('http://127.0.0.1:5000/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    showError(error.error || 'Search failed');
                    return;
                }
                
                const data = await response.json();
                displaySongResult(data);
            } catch (err) {
                showError('Network error: ' + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displaySongResult(data) {
            const song = data.song;
            const giftLink = data.gift_link;
            
            const html = `
                <div class="song-result">
                    ${song.image_url ? `<img src="${song.image_url}" alt="${song.name}" class="song-image">` : ''}
                    <div class="song-info">
                        <div class="song-name">${song.name}</div>
                        <div class="song-artist">${song.artist}</div>
                        <div class="song-album">${song.album}</div>
                        
                        <div class="gift-link-section">
                            <div class="gift-link-label">Your Gift Link</div>
                            <div class="gift-link">
                                <input type="text" class="gift-link-input" value="${giftLink}" readonly>
                                <button class="copy-btn" onclick="copyToClipboard('${giftLink}', this)">Copy</button>
                            </div>
                        </div>
                        
                        <a href="${song.spotify_url}" target="_blank" class="spotify-button">
                            Open on Spotify
                        </a>
                    </div>
                </div>
            `;
            
            document.getElementById('result').innerHTML = html;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const original = button.textContent;
                button.textContent = '✓ Copied';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = original;
                    button.classList.remove('copied');
                }, 2000);
            });
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchSong();
            }
        }
    </script>
</body>
</html>
